<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Mom!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff5fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; }
    .card { display: flex; flex-direction: column; align-items: center; padding: 2rem; text-align: center; }
    .title { font-size: 30px; color: #c94090; margin-bottom: 20px; }
    
    /* Envelope Styles */
    .envelope-wrapper { position: relative; margin-top: 2rem; cursor: pointer; }
    .envelope { width: 120px; height: 80px; background: #f28bbd; position: relative; border-radius: 4px; }
    .envelope::before { content: ""; position: absolute; top: 0; left: 0; border-top: 40px solid #f9bedd; border-right: 60px solid transparent; border-left: 60px solid transparent; }
    
    /* The Letter Inside */
    .letter { position: absolute; top: 0; left: 10px; width: 100px; height: 70px; background: white; transition: 0.5s; padding: 10px; font-size: 8px; border: 1px solid #ccc; display: none; }
    .open-anim .letter { top: -80px; display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="title">Happy Birthday, Mom!</div>
  
  <!-- Original Cake SVG -->
  <svg viewBox="0 0 340 300" width="300" height="265" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="170" cy="258" rx="125" ry="13" fill="#e8c8e8" opacity="0.45"/>
    <rect x="55" y="188" width="230" height="72" rx="10" fill="#f28bbd"/>
    <rect x="55" y="188" width="230" height="16" rx="6" fill="#f9bedd"/>
    <rect x="97" y="118" width="146" height="74" rx="10" fill="#e877b0"/>
    <rect x="97" y="118" width="146" height="16" rx="6" fill="#f5aad2"/>
    <g class="candle"><rect x="112" y="86" width="12" height="32" rx="3" fill="#ffe44d"/><ellipse cx="118" cy="86" rx="6" ry="3" fill="#ffd000"/><ellipse cx="118" cy="77" rx="5" ry="8" fill="#ff9500" opacity="0.9"/></g>
    <g class="candle"><rect x="134" y="83" width="12" height="35" rx="3" fill="#f28bbd"/><ellipse cx="140" cy="83" rx="6" ry="3" fill="#e05090"/><ellipse cx="140" cy="74" rx="5" ry="8" fill="#ff5555" opacity="0.9"/></g>
    <g class="candle"><rect x="156" y="85" width="12" height="33" rx="3" fill="#c9aaff"/><ellipse cx="162" cy="85" rx="6" ry="3" fill="#9966cc"/><ellipse cx="162" cy="76" rx="5" ry="8" fill="#ff9500" opacity="0.9"/></g>
  </svg>

  <!-- Envelope Component -->
  <div class="envelope-wrapper" onclick="this.classList.toggle('open-anim')">
    <div class="envelope"></div>
    <div class="letter">
      To the most wonderful mom in the world — I love you more than words could ever say. Always ❤️
    </div>
  </div>
</div>

</body>
</html>
